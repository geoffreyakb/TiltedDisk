[Grid]
X1-grid         1   1.0                     512      l    10.0
X2-grid         1   0.5707963267948966      512      u    2.5707963267948966

[TimeIntegrator]
CFL             0.5
tstop           3000.1
nstages         3

[Hydro]
solver          hllc
csiso           userdef
viscosity       explicit  userdef

[Gravity]
potential       userdef

[Boundary]
X1-beg          outflow
X1-end          outflow
X2-beg          outflow
X2-end          outflow

[Setup]
epsilon             0.05
alpha               1.0e-3
tilt                0
densityFloor        1e-12
spin                -1.0
gravity             Einstein
BardeenPetterson    True

[Output]
vtk             10
vtk_dir         output/vtk
dmp             100.0
dmp_dir         output/dmp
log             100
analysis        1.0

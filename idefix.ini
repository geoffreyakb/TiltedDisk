[Grid]
X1-grid         1   1.0                 64      l    20.0
X2-grid         1   0.0                 256      u   3.1415926535897932

[TimeIntegrator]
CFL             0.5
tstop           1000.1
nstages         3

[Hydro]
solver          hllc
csiso           userdef
viscosity       explicit  userdef

[Gravity]
potential       userdef

[Boundary]
X1-beg          outflow
X1-end          outflow
X2-beg          axis
X2-end          axis

[Setup]
epsilon         0.05
alpha           1.0e-3
tilt            0
densityFloor    1e-12
spin            0

[Output]
vtk             10
vtk_dir         output/vtk
dmp             100.0
dmp_dir         output/dmp
log             100
analysis        1.0

[Grid]
X1-grid         1   1.0                 64  u   3.0
X2-grid         1   0.5707963267948965  64  u   2.5707963267948966
X3-grid         1   0.0                 64  u   6.2831853071795864

[TimeIntegrator]
CFL             0.5
tstop           100.0
nstages         2

[Hydro]
solver          hllc
csiso           userdef
viscosity       explicit  userdef

[Gravity]
potential       central
Mcentral        1.0

[Boundary]
X1-beg          outflow
X1-end          outflow
X2-beg          outflow
X2-end          outflow
X3-beg          periodic
X3-end          periodic

[Setup]
epsilon         0.1
alpha           2.0e-3
tilt            15
densityFloor    1e-9

[Output]
vtk             0.5
vtk_dir         output/vtk
vtk_slice1      0.5     2   0.0                     cut
vtk_slice2      0.5     2   3.1415926535897932      cut
vtk_slice3      0.5     2   1.5707963267948966      cut
vtk_slice4      0.5     2   4.7123889803846898      cut
vtk_slice5      0.5     1   1.5707963267948966      cut
dmp             500.0
dmp_dir         output/dmp
log             10
analysis        0.1

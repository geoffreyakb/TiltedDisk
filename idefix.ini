[Grid]
X1-grid         1   1.0                 80      l   10.0
X2-grid         1   1.1207963267948966  40      u   2.0207963267948966
X3-grid         1   0.0                 100     u   6.2831853071795864

[TimeIntegrator]
CFL             0.5
tstop           9000.1
nstages         2

[Hydro]
solver          hllc
csiso           userdef
viscosity       explicit  userdef

[Gravity]
potential       central
Mcentral        1.0

[Boundary]
X1-beg          outflow
X1-end          outflow
X2-beg          outflow
X2-end          outflow
X3-beg          periodic
X3-end          periodic

[Setup]
epsilon         0.05
alpha           1.0e-3
tilt            0
densityFloor    1e-9

[Output]
vtk             10
vtk_dir         output/vtk
vtk_slice1      10      2   0.0                     cut
vtk_slice2      10      2   3.1415926535897932      cut
vtk_slice3      10      2   1.5707963267948966      cut
vtk_slice4      10      2   4.7123889803846898      cut
vtk_slice5      10      1   1.5707963267948966      cut
dmp             1000.0
dmp_dir         output/dmp
log             100
analysis        1.0
